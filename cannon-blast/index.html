<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannon Blast</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    #game-container {
      position: relative;
      width: 600px;
      height: 800px;
      background: #222;
      border: 2px solid #444;
      border-radius: 8px;
      overflow: hidden;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
      pointer-events: none;
    }
    .stat-box {
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 4px;
      font-weight: bold;
    }
    #coins { color: #ffd700; }
    #score { color: #fff; }
    
    #upgrades-panel {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      display: flex;
      justify-content: space-around;
      z-index: 20;
      border-top: 1px solid #444;
    }
    .upgrade-btn {
      background: #333;
      color: white;
      border: 1px solid #555;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      transition: background 0.2s;
      font-family: 'Outfit', sans-serif;
    }
    .upgrade-btn:hover:not(:disabled) { background: #444; }
    .upgrade-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .upgrade-cost { color: #ffd700; font-weight: bold; display: block; margin-top: 4px; }
    .stat-info { display: block; font-size: 11px; color: #94a3b8; margin: 2px 0; }
    .stat-info span { color: #fff; font-weight: 600; }
    
    #level-progress-container {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      background: #333;
      border: 2px solid #555;
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
    }
    #level-progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4a90e2, #2962ff);
      transition: width 0.3s;
    }
    #level-text {
      position: absolute;
      top: -2px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
    }
    
    .screen-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .screen-overlay h2 { font-size: 32px; margin-bottom: 20px; text-shadow: 0 4px 6px rgba(0,0,0,0.5); }
    .screen-btn {
      padding: 10px 20px;
      font-size: 18px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
      min-width: 150px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: transform 0.1s, background 0.2s;
    }
    .screen-btn:hover { background: #357abd; transform: translateY(-2px); }
    
    #game-over h2 { color: #ff4444; }
    #victory-screen h2 { color: #ffd700; }
    #main-menu h2 { color: #fff; font-size: 40px; margin-bottom: 40px; }
    
    #cannon {
      position: absolute;
      bottom: 60px; /* Above upgrades panel */
      left: 175px;
      width: 60px;
      height: 40px;
      background: linear-gradient(180deg, #4a90e2, #2962ff);
      border-radius: 8px 8px 4px 4px;
      display: flex;
      justify-content: center;
      z-index: 5;
      box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.5);
      transition: background 0.3s;
    }
    
    /* Cannon Skins */
    #cannon.skin-crimson { background: linear-gradient(180deg, #e53935, #b71c1c); }
    #cannon.skin-crimson .cannon-barrel { background: linear-gradient(90deg, #444 0%, #888 50%, #444 100%); }
    #cannon.skin-crimson::before, #cannon.skin-crimson::after { border-color: #ff5252; }
    
    #cannon.skin-gold { background: linear-gradient(180deg, #ffd700, #ff8f00); }
    #cannon.skin-gold .cannon-barrel { background: linear-gradient(90deg, #ffe066 0%, #fff 50%, #ffe066 100%); border-color: #b8860b; }
    #cannon.skin-gold .cannon-barrel::after { background: #b8860b; }
    #cannon.skin-gold::before, #cannon.skin-gold::after { border-color: #ffd700; background: radial-gradient(circle at center, #ffe066 30%, #555 60%, #111 100%); }
    
    #cannon.skin-neon { background: linear-gradient(180deg, #00e5ff, #2979ff); box-shadow: 0 0 15px #00e5ff; }
    #cannon.skin-neon .cannon-barrel { background: #111; border-color: #00e5ff; box-shadow: 0 0 10px #00e5ff; }
    #cannon.skin-neon .cannon-barrel::after { background: #00e5ff; }
    #cannon.skin-neon::before, #cannon.skin-neon::after { border-color: #00e5ff; background: #111; box-shadow: 0 0 10px #00e5ff; }

    #cannon::before { /* Left wheel */
      content: '';
      position: absolute;
      bottom: -10px;
      left: -5px;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle at center, #777 30%, #222 60%, #111 100%);
      border-radius: 50%;
      border: 2px solid #555;
      z-index: 6;
      box-shadow: 0 4px 5px rgba(0,0,0,0.6);
    }
    #cannon::after { /* Right wheel */
      content: '';
      position: absolute;
      bottom: -10px;
      right: -5px;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle at center, #777 30%, #222 60%, #111 100%);
      border-radius: 50%;
      border: 2px solid #555;
      z-index: 6;
      box-shadow: 0 4px 5px rgba(0,0,0,0.6);
    }
    .cannon-barrel { /* Cannon barrel */
      position: absolute;
      top: -25px;
      width: 20px;
      height: 35px;
      background: linear-gradient(90deg, #555 0%, #aaa 50%, #555 100%);
      border-radius: 4px;
      z-index: 4;
      border: 1px solid #333;
      border-bottom: none;
    }
    .cannon-barrel::after {
      content: '';
      position: absolute;
      top: -5px;
      left: -2px;
      width: 22px;
      height: 8px;
      background: #333;
      border-radius: 2px;
      border: 1px solid #111;
    }
    
    .bullet {
      position: absolute;
      width: 8px;
      height: 16px;
      background: #ffcc00;
      border-radius: 4px;
      z-index: 4;
    }
    
    .hit-text {
      position: absolute;
      color: white;
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
      animation: floatUp 0.5s ease-out forwards;
      text-shadow: 1px 1px 2px #000;
    }
    .hit-text.crit {
      color: #ffaa00;
      font-size: 20px !important;
      text-shadow: 0 0 5px #ff0000, 1px 1px 2px #000;
      z-index: 11;
    }
    
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-30px) scale(1.5); opacity: 0; }
    }
    
    .ball {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      z-index: 3;
      box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 10px rgba(0,0,0,0.5);
    }
    
    .ball.freeze {
      background: radial-gradient(circle at 30% 30%, #00ffff, #0055ff) !important;
      box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 15px rgba(0,255,255,0.8);
      border: 2px solid #fff;
    }
    
    .coin-drop {
      position: absolute;
      width: 15px;
      height: 15px;
      background: radial-gradient(circle, #ffe066 0%, #ffb300 100%);
      border-radius: 50%;
      z-index: 2;
      border: 1px solid #ff8800;
      animation: coinSpin 1s linear infinite;
    }
    
    @keyframes coinSpin {
      0% { transform: scaleX(1); }
      50% { transform: scaleX(0.2); }
      100% { transform: scaleX(1); }
    }
    
    .boss {
      position: absolute;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at 30% 30%, #ff5252, #8b0000);
      border-radius: 20px; /* Square with rounded corners */
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 24px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      z-index: 8;
      box-shadow: 0 0 20px rgba(255,0,0,0.5), inset -10px -10px 20px rgba(0,0,0,0.5);
      border: 3px solid #ffaaaa;
      overflow: hidden;
    }
    
    .boss::before {
      content: '';
      position: absolute;
      top: 20px; left: 20px;
      width: 30px; height: 30px;
      background: #000;
      border-radius: 50%;
      box-shadow: 50px 0 0 #000;
    }
    
    .boss-warning {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff0000;
      font-size: 40px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff0000, 2px 2px 0 #fff;
      animation: flash 0.2s infinite alternate;
      z-index: 9;
      pointer-events: none;
    }
    
    @keyframes flash {
      from { opacity: 1; transform: translateX(-50%) scale(1); }
      to { opacity: 0.5; transform: translateX(-50%) scale(1.2); }
    }

    /* Mobile Controls */
    #mobile-slider-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 40px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border: 1px solid #4a90e2;
      box-shadow: 0 0 15px rgba(74, 144, 226, 0.3);
      z-index: 25;
      display: none; /* Shown via JS */
    }
    #mobile-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      outline: none;
    }
    #mobile-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 30px;
      height: 30px;
      background: #4a90e2;
      border: 2px solid #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(74, 144, 226, 0.8);
    }

    /* Backgrounds */
    #game-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: linear-gradient(to bottom, #1a2a44 0%, #3a5a84 100%);
    }

    /* Snowy Mountains Background */
    .bg-mountains .mountain {
      position: absolute;
      bottom: 60px;
      width: 0;
      height: 0;
      border-left: 150px solid transparent;
      border-right: 150px solid transparent;
      border-bottom: 200px solid #4a5a74;
    }
    .bg-mountains .mountain-1 { left: -50px; bottom: 60px; opacity: 0.8; }
    .bg-mountains .mountain-2 { right: -50px; bottom: 80px; transform: scale(1.2); opacity: 0.6; }
    .bg-mountains .mountain-3 { left: 150px; bottom: 50px; transform: scale(0.8); opacity: 0.9; }

    .bg-mountains .peak {
      position: absolute;
      top: 0;
      left: -150px;
      width: 0;
      height: 0;
      border-left: 150px solid transparent;
      border-right: 150px solid transparent;
      border-bottom: 60px solid #fff;
    }

    /* Void Space Background */
    .bg-space {
      background: radial-gradient(circle at center, #111 0%, #000 100%) !important;
    }
    .bg-space::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: radial-gradient(#fff 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.3;
      animation: drift 60s linear infinite;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(-50px, -50px); }
    }

    /* Magma Pit Background */
    .bg-lava {
      background: #1a0505 !important;
    }
    .bg-lava::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 150px;
      background: linear-gradient(to top, #ff4500 0%, transparent 100%);
      opacity: 0.4;
      filter: blur(20px);
      animation: pulse-glow 3s ease-in-out infinite alternate;
    }
    @keyframes pulse-glow {
      from { opacity: 0.3; }
      to { opacity: 0.6; }
    }

    .shop-section {
      width: 90%;
      margin: 10px 0;
      background: rgba(0,0,0,0.5);
      padding: 15px;
      border-radius: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .shop-section h3 { width: 100%; text-align: center; margin-bottom: 10px; color: #4a90e2; }

    #shop-screen h2 { color: #4a90e2; margin-top: 40px; }
    
    #open-shop-btn {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 80px !important;
      height: 80px;
      min-width: 0 !important;
      border-radius: 50% !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 14px !important;
      padding: 5px !important;
      background: #eab308;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      border: 2px solid #fff;
    }
    
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      padding: 0.6rem 1.2rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      color: #94a3b8;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    .back-btn:hover { 
      color: white; 
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.2);
    }
    </style>
</head>
<body>
  <a href="../" class="back-btn">← Portal</a>
  <div id="game-container">
    <div id="game-background" class="bg-mountains">
      <div class="mountain mountain-1"><div class="peak"></div></div>
      <div class="mountain mountain-2"><div class="peak"></div></div>
      <div class="mountain mountain-3"><div class="peak"></div></div>
    </div>
    
    <div id="ui-layer">
      <div class="stat-box">Coins: <span id="coins">0</span></div>
    </div>
    
    <div id="level-progress-container" style="display: none;">
      <div id="level-progress-fill"></div>
      <div id="level-text">Level 1</div>
    </div>
    
    <div id="mobile-slider-container">
      <input type="range" id="mobile-slider" min="0" max="100" value="50">
    </div>

    <div id="cannon">
      <div class="cannon-barrel"></div>
    </div>
    
    <div id="main-menu" class="screen-overlay">
      <h2>Cannon Blast</h2>
      
      <div id="upgrades-panel">
        <button class="upgrade-btn" id="upg-damage">
          <div>Damage (Lvl <span id="lvl-damage">1</span>)</div>
          <div class="stat-info">Current: <span id="val-damage">1</span> DMG</div>
          <span class="upgrade-cost" id="cost-damage">10</span>
        </button>
        <button class="upgrade-btn" id="upg-firerate">
          <div>Fire Rate (Lvl <span id="lvl-firerate">1</span>)</div>
          <div class="stat-info">Current: <span id="val-firerate">2.5</span>/sec</div>
          <span class="upgrade-cost" id="cost-firerate">10</span>
        </button>
        <button class="upgrade-btn" id="upg-crit">
          <div>Crit Chance (Lvl <span id="lvl-crit">1</span>)</div>
          <div class="stat-info">Current: <span id="val-crit">2</span>%</div>
          <span class="upgrade-cost" id="cost-crit">15</span>
        </button>
      </div>
      
      <button class="screen-btn" id="play-btn" style="margin-top: 20px; font-size: 24px;">Play</button>
      <button class="screen-btn" id="open-shop-btn">
        <span style="font-size: 24px;">🛒</span>
        <span>SHOP</span>
      </button>
    </div>

    <div id="shop-screen" class="screen-overlay" style="display: none;">
      <button class="screen-btn" id="close-shop-btn">← Back</button>
      <h2>The Shop</h2>
      <div id="shop-content" style="width: 100%; display: flex; flex-direction: column; align-items: center; overflow-y: auto; max-height: 70vh;">
        <!-- Generated via JS -->
      </div>
    </div>
    
    <div id="game-over" class="screen-overlay" style="display: none;">
      <h2>Game Over</h2>
      <button class="screen-btn" id="restart-btn">Try Again</button>
      <button class="screen-btn" id="menu-btn-go">Main Menu</button>
    </div>
    
    <div id="victory-screen" class="screen-overlay" style="display: none;">
      <h2>Level Cleared!</h2>
      <button class="screen-btn" id="next-level-btn">Next Level</button>
      <button class="screen-btn" id="menu-btn-vic">Main Menu</button>
    </div>
  </div>

  <script>
    const container = document.getElementById('game-container');
    const cannonEl = document.getElementById('cannon');
    const coinsEl = document.getElementById('coins');
    const mainMenuScreen = document.getElementById('main-menu');
    const gameOverScreen = document.getElementById('game-over');
    const victoryScreen = document.getElementById('victory-screen');
    const shopScreen = document.getElementById('shop-screen');
    const shopContent = document.getElementById('shop-content');
    const upgradesPanel = document.getElementById('upgrades-panel');
    const gameBg = document.getElementById('game-background');
    const levelProgressContainer = document.getElementById('level-progress-container');
    const levelProgressFill = document.getElementById('level-progress-fill');
    const levelText = document.getElementById('level-text');
    
    // Game constants
    const GAME_W = 600;
    const GAME_H = 800;
    const CANNON_W = 60;
    const FLOOR_Y = 740; // Above upgrades panel
    const GRAVITY = 0.15;
    const BOSS_W = 120;
    const BOSS_H = 120;
    
    // State
    let state = {
      running: false,
      cannonX: 270,
      coins: 0,
      
      // Progression
      level: 1,
      ballsSpawnedThisLevel: 0,
      ballsDestroyedThisLevel: 0,
      totalBallsForLevel: 10,
      maxBallsOnScreen: 5,
      freezeEndTime: 0,
      isBossLevel: false,
      boss: null,
      
      // Cannon stats
      damage: 1,
      fireRate: 400, // ms between shots
      critChance: 2, // percentage
      lastShotTime: 0,
      
      // Upgrades
      damageLvl: 1,
      fireRateLvl: 1,
      critLvl: 1,
      damageCost: 10,
      fireRateCost: 10,
      critCost: 15,
      
      // Cosmetics
      unlockedSkins: ['default'],
      equippedSkin: 'default',
      unlockedBackgrounds: ['bg-mountains'],
      equippedBackground: 'bg-mountains',
      
      // Input
      keys: {},
      isShooting: false,
      isDragging: false,
      dragOffsetX: 0,
      
      // Entities
      bullets: [], // {x, y, el}
      balls: [],   // {x, y, vx, vy, radius, hp, maxHp, el, color}
      drops: []    // {x, y, vx, vy, el}
    };
    
    // Utility
    function random(min, max) { return Math.random() * (max - min) + min; }
    
    const colors = [
      '#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#a855f7', '#ec4899'
    ];
    
    const SKINS = [
      { id: 'default', name: 'Standard', cost: 0 },
      { id: 'skin-crimson', name: 'Crimson', cost: 150 },
      { id: 'skin-gold', name: 'Golden Flex', cost: 500 },
      { id: 'skin-neon', name: 'Neon Striker', cost: 1200 }
    ];

    const BACKGROUNDS = [
      { id: 'bg-mountains', name: 'Snowy Mountains', cost: 0, class: 'bg-mountains' },
      { id: 'bg-space', name: 'Void Space', cost: 300, class: 'bg-space' }, // Dark plain background with spots
      { id: 'bg-lava', name: 'Magma Pit', cost: 800, class: 'bg-lava' } // Orange glow at bottom
    ];
    
    function init() {
      function applyMobileMode() {
        const isMobileMode = (localStorage.getItem('globalMobileMode') === 'true');
        const sliderContainer = document.getElementById('mobile-slider-container');
        if (isMobileMode) {
          sliderContainer.style.display = 'flex';
          cannonEl.style.bottom = '120px';
          upgradesPanel.style.bottom = '60px';
        } else {
          sliderContainer.style.display = 'none';
          cannonEl.style.bottom = '60px';
          upgradesPanel.style.bottom = '0';
        }
      }

      applyMobileMode();
      
      // Global Mobile Mode Sync
      window.addEventListener('storage', (e) => {
        if (e.key === 'globalMobileMode') applyMobileMode();
      });

      if (localStorage.getItem('globalMobileMode') === 'true') {
        const slider = document.getElementById('mobile-slider');
        
        // Ensure slider touches don't trigger game dragging
        slider.addEventListener('touchstart', e => e.stopPropagation(), {passive: true});
        slider.addEventListener('touchmove', e => e.stopPropagation(), {passive: true});
        
        slider.addEventListener('input', (e) => {
          const percent = e.target.value / 100;
          state.cannonX = percent * (GAME_W - CANNON_W);
        });
      }

      // Event listeners
      document.addEventListener('keydown', e => state.keys[e.key] = true);
      document.addEventListener('keyup', e => state.keys[e.key] = false);
      
      // Mouse dragging & shooting
      container.addEventListener('mousedown', (e) => {
        state.isShooting = true;
        // Check if starting drag on the cannon area (rough estimate or whole screen depending on preference)
        // Here we just allow dragging anywhere on the container for easier play
        state.isDragging = true;
        
        const rect = container.getBoundingClientRect();
        const pointerX = e.clientX - rect.left;
        
        // Let the cannon snap to where we clicked, or calculate offset
        if(pointerX >= state.cannonX && pointerX <= state.cannonX + CANNON_W) {
             state.dragOffsetX = pointerX - state.cannonX;
        } else {
             state.dragOffsetX = CANNON_W / 2; // snap to center
             state.cannonX = pointerX - state.dragOffsetX;
        }
      });
      document.addEventListener('mousemove', (e) => {
        if (!state.isDragging) return;
        const rect = container.getBoundingClientRect();
        const pointerX = e.clientX - rect.left;
        state.cannonX = pointerX - state.dragOffsetX;
      });
      document.addEventListener('mouseup', () => {
        state.isShooting = false;
        state.isDragging = false;
      });
      
      // Touch dragging & shooting
      container.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        state.isShooting = true; 
        state.isDragging = true;
        
        const rect = container.getBoundingClientRect();
        const touch = e.touches[0];
        const pointerX = touch.clientX - rect.left;
        
        if(pointerX >= state.cannonX && pointerX <= state.cannonX + CANNON_W) {
             state.dragOffsetX = pointerX - state.cannonX;
        } else {
             state.dragOffsetX = CANNON_W / 2;
             state.cannonX = pointerX - state.dragOffsetX;
        }
      }, {passive: false});
      
      document.addEventListener('touchmove', (e) => {
        if (!state.isDragging) return;
        const rect = container.getBoundingClientRect();
        const touch = e.touches[0];
        const pointerX = touch.clientX - rect.left;
        state.cannonX = pointerX - state.dragOffsetX;
      }, {passive: false});
      
      document.addEventListener('touchend', () => {
        state.isShooting = false;
        state.isDragging = false;
      });
      
      document.getElementById('upg-damage').addEventListener('click', upgradeDamage);
      document.getElementById('upg-firerate').addEventListener('click', upgradeFireRate);
      document.getElementById('upg-crit').addEventListener('click', upgradeCrit);
      
      document.getElementById('play-btn').addEventListener('click', () => {
        loadProgress();
        startLevel();
      });
      document.getElementById('restart-btn').addEventListener('click', startLevel);
      document.getElementById('next-level-btn').addEventListener('click', () => {
        state.level += 1;
        saveProgress();
        startLevel();
      });
      document.getElementById('menu-btn-go').addEventListener('click', showMenu);
      document.getElementById('menu-btn-vic').addEventListener('click', () => {
        state.level += 1;
        saveProgress();
        showMenu();
      });
      
      showMenu();
      
      // Spawn timer continuous loop (will check conditions inside)
      setInterval(spawnLevelBall, 1500);

      document.getElementById('open-shop-btn').addEventListener('click', showShop);
      document.getElementById('close-shop-btn').addEventListener('click', showMenu);
    }
    
    function showMenu() {
      state.running = false;
      mainMenuScreen.style.display = 'flex';
      gameOverScreen.style.display = 'none';
      victoryScreen.style.display = 'none';
      shopScreen.style.display = 'none';
      levelProgressContainer.style.display = 'none';
      loadProgress();
      if (state.level > 1) {
        document.getElementById('play-btn').textContent = `Resume Level ${state.level}`;
      } else {
        document.getElementById('play-btn').textContent = `Play`;
      }
    }

    function showShop() {
      mainMenuScreen.style.display = 'none';
      shopScreen.style.display = 'flex';
      renderShop();
    }
    
    function renderShop() {
      shopContent.innerHTML = '';

      // Skins Section
      const skinsSec = document.createElement('div');
      skinsSec.className = 'shop-section';
      skinsSec.innerHTML = '<h3>Cannon Skins</h3>';
      
      SKINS.forEach(skin => {
        const isUnlocked = state.unlockedSkins.includes(skin.id);
        const isEquipped = state.equippedSkin === skin.id;
        const btn = document.createElement('button');
        btn.className = 'upgrade-btn';
        btn.style.width = '110px';
        
        if (isEquipped) {
            btn.innerHTML = `<div>${skin.name}</div><span style="color:#0f0; margin-top:4px; display:block;">Equipped</span>`;
            btn.disabled = true;
        } else if (isUnlocked) {
            btn.innerHTML = `<div>${skin.name}</div><span style="color:#fff; margin-top:4px; display:block;">Equip</span>`;
            btn.onclick = () => {
                state.equippedSkin = skin.id;
                applySkin();
                saveProgress();
                renderShop();
            };
        } else {
            btn.innerHTML = `<div>${skin.name}</div><span class="upgrade-cost">${skin.cost}</span>`;
            btn.disabled = state.coins < skin.cost;
            btn.onclick = () => {
                if (state.coins >= skin.cost) {
                    state.coins -= skin.cost;
                    state.unlockedSkins.push(skin.id);
                    state.equippedSkin = skin.id;
                    updateUI();
                    saveProgress();
                    applySkin();
                    renderShop();
                }
            };
        }
        skinsSec.appendChild(btn);
      });
      shopContent.appendChild(skinsSec);

      // Backgrounds Section
      const bgSec = document.createElement('div');
      bgSec.className = 'shop-section';
      bgSec.innerHTML = '<h3>Backgrounds</h3>';

      BACKGROUNDS.forEach(bg => {
        const isUnlocked = state.unlockedBackgrounds.includes(bg.id);
        const isEquipped = state.equippedBackground === bg.id;
        const btn = document.createElement('button');
        btn.className = 'upgrade-btn';
        btn.style.width = '110px';

        if (isEquipped) {
          btn.innerHTML = `<div>${bg.name}</div><span style="color:#0f0; margin-top:4px; display:block;">Equipped</span>`;
          btn.disabled = true;
        } else if (isUnlocked) {
          btn.innerHTML = `<div>${bg.name}</div><span style="color:#fff; margin-top:4px; display:block;">Equip</span>`;
          btn.onclick = () => {
            state.equippedBackground = bg.id;
            applyBackground();
            saveProgress();
            renderShop();
          };
        } else {
          btn.innerHTML = `<div>${bg.name}</div><span class="upgrade-cost">${bg.cost}</span>`;
          btn.disabled = state.coins < bg.cost;
          btn.onclick = () => {
            if (state.coins >= bg.cost) {
              state.coins -= bg.cost;
              state.unlockedBackgrounds.push(bg.id);
              state.equippedBackground = bg.id;
              updateUI();
              saveProgress();
              applyBackground();
              renderShop();
            }
          };
        }
        bgSec.appendChild(btn);
      });
      shopContent.appendChild(bgSec);
    }
    
    function applySkin() {
      cannonEl.className = state.equippedSkin === 'default' ? '' : state.equippedSkin;
    }

    function applyBackground() {
      gameBg.className = state.equippedBackground;
      // Handle special backgrounds
      if (state.equippedBackground === 'bg-mountains') {
        gameBg.innerHTML = `
          <div class="mountain mountain-1"><div class="peak"></div></div>
          <div class="mountain mountain-2"><div class="peak"></div></div>
          <div class="mountain mountain-3"><div class="peak"></div></div>
        `;
      } else {
        gameBg.innerHTML = ''; // Keep simple for now
      }
    }
    
    function startLevel() {
      // Clear entities
      [...state.bullets, ...state.balls, ...state.drops, ...document.querySelectorAll('.hit-text')].forEach(e => {
        if(e.el) e.el.remove();
        else e.remove();
      });
      
      // Reset level state
      state.ballsSpawnedThisLevel = 0;
      state.ballsDestroyedThisLevel = 0;
      state.isBossLevel = state.level % 5 === 0;
      state.totalBallsForLevel = state.isBossLevel ? 1 : (10 + Math.floor(state.level * 3)); // 1 for boss
      
      state.running = true;
      state.cannonX = 270;
      state.bullets = [];
      state.balls = [];
      state.drops = [];
      state.lastShotTime = 0;
      state.freezeEndTime = 0;
      
      if (state.boss && state.boss.el) {
          state.boss.el.remove();
      }
      state.boss = null;
      
      if (state.isBossLevel) {
          const bossHp = state.level * 50;
          const el = document.createElement('div');
          el.className = 'boss';
          el.innerText = bossHp;
          el.style.left = ((GAME_W - BOSS_W) / 2) + 'px';
          el.style.top = '50px';
          container.appendChild(el);
          
          state.boss = {
              x: (GAME_W - BOSS_W) / 2,
              y: 50,
              vx: 3, // hovering speed
              vy: 0,
              hp: bossHp,
              maxHp: bossHp,
              el: el,
              phase: 'hover', // hover, warning, slam, return
              timer: 0,
              warningEl: null
          };
      }
      
      cannonEl.style.left = state.cannonX + 'px';
      applySkin();
      updateUI();
      mainMenuScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      victoryScreen.style.display = 'none';
      levelProgressContainer.style.display = 'block';
      
      levelText.textContent = state.isBossLevel ? `BOSS ROUND!` : `Level ${state.level}`;
      updateProgressBar();
      
      requestAnimationFrame(gameLoop);
    }
    
    function saveProgress() {
      const saveData = {
        level: state.level,
        coins: state.coins,
        damage: state.damage, damageLvl: state.damageLvl, damageCost: state.damageCost,
        fireRate: state.fireRate, fireRateLvl: state.fireRateLvl, fireRateCost: state.fireRateCost,
        critChance: state.critChance, critLvl: state.critLvl, critCost: state.critCost,
        unlockedSkins: state.unlockedSkins, equippedSkin: state.equippedSkin,
        unlockedBackgrounds: state.unlockedBackgrounds, equippedBackground: state.equippedBackground
      };
      localStorage.setItem('cannonBlastSave', JSON.stringify(saveData));
    }
    
    function loadProgress() {
      const saved = localStorage.getItem('cannonBlastSave');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          Object.assign(state, data);
          
          document.getElementById('lvl-damage').textContent = state.damageLvl;
          document.getElementById('cost-damage').textContent = state.damageCost;
          
          document.getElementById('lvl-firerate').textContent = state.fireRateLvl;
          if (state.fireRate <= 50) {
            document.getElementById('cost-firerate').textContent = 'MAX';
          } else {
            document.getElementById('cost-firerate').textContent = state.fireRateCost;
          }
          
          document.getElementById('lvl-crit').textContent = state.critLvl;
          document.getElementById('cost-crit').textContent = state.critCost;
          
          document.getElementById('val-damage').textContent = state.damage;
          document.getElementById('val-firerate').textContent = (1000 / state.fireRate).toFixed(1);
          document.getElementById('val-crit').textContent = state.critChance;
          
          if (!state.unlockedSkins) state.unlockedSkins = ['default'];
          if (!state.equippedSkin) state.equippedSkin = 'default';
          if (!state.unlockedBackgrounds) state.unlockedBackgrounds = ['bg-mountains'];
          if (!state.equippedBackground) state.equippedBackground = 'bg-mountains';
          
          applySkin();
          applyBackground();
          updateUI();
        } catch(e) { console.error('Save data corrupted', e); }
      }
    }
    
    // Upgrades
    function upgradeDamage() {
      if (state.coins >= state.damageCost) {
        state.coins -= state.damageCost;
        state.damage += 1;
        state.damageLvl += 1;
        state.damageCost = Math.floor(state.damageCost * 1.5);
        document.getElementById('lvl-damage').textContent = state.damageLvl;
        document.getElementById('cost-damage').textContent = state.damageCost;
        document.getElementById('val-damage').textContent = state.damage;
        updateUI();
        saveProgress();
      }
    }
    
    function upgradeFireRate() {
      if (state.coins >= state.fireRateCost && state.fireRate > 50) {
        state.coins -= state.fireRateCost;
        state.fireRate = Math.max(50, state.fireRate * 0.92);
        state.fireRateLvl += 1;
        state.fireRateCost = Math.floor(state.fireRateCost * 1.5);
        document.getElementById('lvl-firerate').textContent = state.fireRateLvl;
        document.getElementById('cost-firerate').textContent = state.fireRateCost;
        
        if (state.fireRate <= 50) {
            document.getElementById('cost-firerate').textContent = 'MAX';
            document.getElementById('upg-firerate').disabled = true;
        } else {
            document.getElementById('cost-firerate').textContent = state.fireRateCost;
        }
        document.getElementById('val-firerate').textContent = (1000 / state.fireRate).toFixed(1);
        updateUI();
        saveProgress();
      }
    }
    
    function upgradeCrit() {
      if (state.coins >= state.critCost) {
        state.coins -= state.critCost;
        state.critChance += 2;
        state.critLvl += 1;
        state.critCost = Math.floor(state.critCost * 1.5);
        document.getElementById('lvl-crit').textContent = state.critLvl;
        document.getElementById('cost-crit').textContent = state.critCost;
        document.getElementById('val-crit').textContent = state.critChance;
        updateUI();
        saveProgress();
      }
    }
    
    function updateUI() {
      coinsEl.textContent = state.coins;
      
      document.getElementById('upg-damage').disabled = state.coins < state.damageCost;
      document.getElementById('upg-crit').disabled = state.coins < state.critCost;
      if (state.fireRate > 50) {
        document.getElementById('upg-firerate').disabled = state.coins < state.fireRateCost;
      }
      
      // Update shop buttons live if shop is open
      if (shopScreen.style.display !== 'none') {
        renderShop();
      }
    }
    
    function updateProgressBar() {
      let pct = 0;
      if (state.isBossLevel && state.boss) {
          pct = Math.max(0, (state.boss.hp / state.boss.maxHp) * 100);
      } else {
          pct = Math.min(100, (state.ballsDestroyedThisLevel / state.totalBallsForLevel) * 100);
      }
      levelProgressFill.style.width = pct + '%';
    }
    
    // Spawners
    function spawnLevelBall() {
      if (!state.running) return;
      if (state.isBossLevel) return; // Boss handles its own minions
      if (state.ballsSpawnedThisLevel >= state.totalBallsForLevel) return;
      if (state.balls.length >= state.maxBallsOnScreen) return; // Hard limit 5
      
      state.ballsSpawnedThisLevel++;
      
      const side = Math.random() > 0.5 ? 1 : -1; // 1 = right, -1 = left
      const radius = random(30, 45); // Vary sizes slightly for initial spawns
      const x = side === 1 ? GAME_W + radius : -radius;
      const y = random(100, 250);
      const vx = side === 1 ? random(-3.5, -1.5) : random(1.5, 3.5);
      const vy = random(-3, -1); // upward arc
      
      // Base HP scales with level
      const baseHp = 10 + ((state.level - 1) * 5);
      
      // 5% chance for a freeze ball
      const type = Math.random() < 0.05 ? 'freeze' : 'normal';
      
      createBall(x, y, vx, vy, radius, baseHp, type);
    }
    
    function createBall(x, y, vx, vy, radius, hp, type = 'normal') {
      const el = document.createElement('div');
      el.className = 'ball' + (type === 'freeze' ? ' freeze' : '');
      
      if (type !== 'freeze') {
        const color = colors[Math.floor(Math.random() * colors.length)];
        el.style.background = `radial-gradient(circle at 30% 30%, ${color}, #000)`;
      }
      
      el.style.width = (radius * 2) + 'px';
      el.style.height = (radius * 2) + 'px';
      el.innerText = hp;
      
      container.appendChild(el);
      
      state.balls.push({
        x, y, vx, vy, radius, hp, maxHp: hp, el, type
      });
    }
    
    function spawnDrop(x, y, amount) {
        for(let i=0; i<Math.min(amount, 10); i++) { // cap visuals to 10 max
            const el = document.createElement('div');
            el.className = 'coin-drop';
            container.appendChild(el);
            
            state.drops.push({
                x, y,
                vx: random(-3, 3),
                vy: random(-5, -2),
                el
            });
        }
        // Immediately add coins (visuals drop to bottom)
        state.coins += amount;
        updateUI();
    }
    
    // Loop
    function gameLoop(timestamp) {
      if (!state.running) return;
      
      update(timestamp);
      draw();
      
      requestAnimationFrame(gameLoop);
    }
    
    function update(timestamp) {
      // Player movement
      const speed = 6;
      if (state.keys['ArrowLeft'] || state.keys['a']) state.cannonX -= speed;
      if (state.keys['ArrowRight'] || state.keys['d']) state.cannonX += speed;
      
      // Clamp cannon
      state.cannonX = Math.max(0, Math.min(GAME_W - CANNON_W, state.cannonX));
      
      // Shooting
      if (state.isShooting && timestamp - state.lastShotTime > state.fireRate) {
        state.lastShotTime = timestamp;
        shoot();
      }
      
      // Update bullets
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        b.y -= 10;
        
        // Remove offscreen
        if (b.y < -20) {
          b.el.remove();
          state.bullets.splice(i, 1);
        }
      }
      
      // Update Boss
      if (state.isBossLevel && state.boss) {
         const boss = state.boss;
         
         if (boss.phase === 'hover') {
             boss.x += boss.vx;
             if (boss.x <= 0 || boss.x + BOSS_W >= GAME_W) boss.vx *= -1;
             
             // Spawn minions randomly
             if (Math.random() < 0.015 && state.balls.length < state.maxBallsOnScreen) {
                 const radius = random(20, 30);
                 const hp = Math.max(1, Math.floor(state.level * 1.5));
                 createBall(boss.x + BOSS_W/2, boss.y + BOSS_H, random(-2, 2), 2, radius, hp, 'normal');
             }
             
             // Trigger slam randomly
             if (Math.random() < 0.005) {
                 boss.phase = 'warning';
                 boss.timer = timestamp + 1000;
                 boss.warningEl = document.createElement('div');
                 boss.warningEl.className = 'boss-warning';
                 boss.warningEl.innerText = '!';
                 boss.el.appendChild(boss.warningEl);
             }
         } else if (boss.phase === 'warning') {
             // Track player slightly
             const targetX = state.cannonX + CANNON_W/2 - BOSS_W/2;
             boss.x += (targetX - boss.x) * 0.05;
             
             if (timestamp > boss.timer) {
                 boss.phase = 'slam';
                 boss.vy = 15;
                 if (boss.warningEl) {
                     boss.warningEl.remove();
                     boss.warningEl = null;
                 }
             }
         } else if (boss.phase === 'slam') {
             boss.y += boss.vy;
             
             // Collision with cannon
             if (boss.y + BOSS_H > FLOOR_Y - 50 && boss.x < state.cannonX + CANNON_W && boss.x + BOSS_W > state.cannonX) {
                 gameOver();
                 return;
             }
             
             if (boss.y + BOSS_H >= FLOOR_Y) {
                 boss.y = FLOOR_Y - BOSS_H;
                 boss.phase = 'wait';
                 boss.timer = timestamp + 1000;
             }
         } else if (boss.phase === 'wait') {
             if (timestamp > boss.timer) {
                 boss.phase = 'return';
             }
         } else if (boss.phase === 'return') {
             boss.y -= 3;
             if (boss.y <= 50) {
                 boss.y = 50;
                 boss.phase = 'hover';
             }
         }
         
         // Boss Bullet Collision
         for (let j = state.bullets.length - 1; j >= 0; j--) {
             const bullet = state.bullets[j];
             const bx = bullet.x + 4;
             const by = bullet.y + 8;
             
             if (bx > boss.x && bx < boss.x + BOSS_W && by > boss.y && by < boss.y + BOSS_H) {
                 // Hit Boss
                 let finalDamage = state.damage;
                 let critMultiplier = 1 + Math.floor(state.critChance / 100);
                 let extraCritChance = state.critChance % 100;
                 let isCrit = false;
                 
                 if (Math.random() < (extraCritChance / 100)) critMultiplier++;
                 if (critMultiplier > 1) { isCrit = true; finalDamage *= critMultiplier; }
                 
                 boss.hp -= finalDamage;
                 boss.el.innerText = Math.ceil(boss.hp);
                 showHitText(bx, by, finalDamage, isCrit);
                 
                 bullet.el.remove();
                 state.bullets.splice(j, 1);
                 
                 boss.el.style.filter = 'brightness(2)';
                 setTimeout(() => { if(boss.el) boss.el.style.filter = 'none'; }, 50);
                 
                 updateProgressBar();
                 
                 if (boss.hp <= 0) {
                     // Boss Defeated
                     state.score += boss.maxHp;
                     spawnDrop(boss.x + BOSS_W/2, boss.y + BOSS_H/2, 20);
                     boss.el.remove();
                     state.boss = null;
                     
                     // Clear remaining minions
                     [...state.balls].forEach((b, idx) => {
                         spawnDrop(b.x, b.y, 1);
                         b.el.remove();
                     });
                     state.balls = [];
                     
                     levelComplete();
                     return;
                 }
                 break;
             }
         }
         
         if (boss) {
             boss.el.style.left = boss.x + 'px';
             boss.el.style.top = boss.y + 'px';
         }
      }
      
      // Update drops
      for (let i = state.drops.length - 1; i >= 0; i--) {
        const d = state.drops[i];
        d.vy += GRAVITY * 1.5;
        d.x += d.vx;
        d.y += d.vy;
        
        if (d.y > FLOOR_Y) {
            d.el.remove();
            state.drops.splice(i, 1);
        }
      }
      
      // Update balls
      for (let i = state.balls.length - 1; i >= 0; i--) {
        const b = state.balls[i];
        
        // Physics only run if not frozen
        if (Date.now() >= state.freezeEndTime) {
            b.vy += GRAVITY;
            b.x += b.vx;
            b.y += b.vy;
        }
        
        // Bounce off walls (only if fully inside screen to prevent getting stuck when spawning)
        if (b.x > 0 && b.x + b.radius * 2 < GAME_W) {
            // Check collisions with bullets here so we don't skip physics if it dies
            let destroyed = false;
            for (let j = state.bullets.length - 1; j >= 0; j--) {
              const bullet = state.bullets[j];
              
              // Bullet center
              const bx = bullet.x + 4;
              const by = bullet.y + 8;
              
              // Ball center
              const ballCx = b.x + b.radius;
              const ballCy = b.y + b.radius;
              
              const distSq = (bx - ballCx)**2 + (by - ballCy)**2;
              
              if (distSq < (b.radius + 4)**2) {
                // Hit! Calculate Damage and Crits
                let finalDamage = state.damage;
                let critMultiplier = 1 + Math.floor(state.critChance / 100);
                let extraCritChance = state.critChance % 100;
                
                let isCrit = false;
                if (Math.random() < (extraCritChance / 100)) {
                   critMultiplier++;
                }
                
                if (critMultiplier > 1) {
                  isCrit = true;
                  finalDamage *= critMultiplier;
                }
                
                b.hp -= finalDamage;
                b.el.innerText = Math.ceil(b.hp);
                
                // Show floating hit text
                showHitText(b.x + b.radius, b.y, finalDamage, isCrit);
                
                // Visual hit flash
                b.el.style.filter = 'brightness(2)';
                setTimeout(() => { if(b.el) b.el.style.filter = 'none'; }, 50);
                
                // Remove bullet
                bullet.el.remove();
                state.bullets.splice(j, 1);
                
                if (b.hp <= 0) {
                  destroyBall(i);
                  destroyed = true;
                  break; // Ball destroyed, stop checking bullets for this ball
                }
              }
            }
            if (destroyed) continue; // Skip rest of loop for this ball
        } else if (b.x <= 0 && b.vx < 0) {
            b.x = 0;
            b.vx *= -1;
        } else if (b.x + b.radius * 2 >= GAME_W && b.vx > 0) {
            b.x = GAME_W - b.radius * 2;
            b.vx *= -1;
        }
        
        // Bounce off floor
        if (b.y + b.radius * 2 > FLOOR_Y) {
          b.y = FLOOR_Y - b.radius * 2;
          b.vy *= -1.02; // Bounciness (slightly higher than 1 to overcome gravity decay and bounce high)
          
          // Minimum bounce height
          if (Math.abs(b.vy) < 4) b.vy = -8;
        }
        
        // Check collisions with player cannon AABB (state.cannonX to state.cannonX + CANNON_W, y=FLOOR_Y-50 to FLOOR_Y)
        const cannonRect = { x: state.cannonX, y: FLOOR_Y - 50, w: CANNON_W, h: 50 };
        const ballCx = b.x + b.radius;
        const ballCy = b.y + b.radius;
        
        // Find closest point on AABB to circle
        const closestX = Math.max(cannonRect.x, Math.min(ballCx, cannonRect.x + cannonRect.w));
        const closestY = Math.max(cannonRect.y, Math.min(ballCy, cannonRect.y + cannonRect.h));
        
        const dx = ballCx - closestX;
        const dy = ballCy - closestY;
        
        if (dx*dx + dy*dy < b.radius*b.radius) {
            gameOver();
            return;
        }
      }
    }
    
    function destroyBall(index) {
      const b = state.balls[index];
      
      // Drops
      spawnDrop(b.x + b.radius, b.y + b.radius, Math.ceil(b.maxHp / 2));
      
      // Activate powerups
      if (b.type === 'freeze') {
         state.freezeEndTime = Date.now() + 5000;
         showHitText(GAME_W / 2, GAME_H / 2, 'FREEZE!', true);
      }
      
      // Split if radius is big enough and we won't exceed screen limit massively
      // We allow standard splits even if it slightly exceeds 5 momentarily
      if (b.radius > 30) {
        const newRadius = b.radius * 0.6;
        const newHp = Math.max(1, Math.floor(b.maxHp * 0.4));
        
        // Split into 2
        createBall(b.x, b.y, b.vx - 1.5, -4, newRadius, newHp);
        createBall(b.x + b.radius, b.y, b.vx + 1.5, -4, newRadius, newHp);
      } else {
        // Only count as destroyed for level progress if it can no longer split
        state.ballsDestroyedThisLevel++;
        updateProgressBar();
      }
      
      b.el.remove();
      state.balls.splice(index, 1);
      updateUI();
      
      // Check win condition
      if (state.ballsDestroyedThisLevel >= state.totalBallsForLevel && state.balls.length === 0) {
        levelComplete();
      }
    }
    
    function showHitText(x, y, damage, isCrit) {
      const el = document.createElement('div');
      el.className = 'hit-text' + (isCrit ? ' crit' : '');
      el.innerText = damage;
      el.style.left = (x + random(-10, 10)) + 'px';
      el.style.top = (y + random(-10, 10)) + 'px';
      el.style.fontSize = isCrit ? '18px' : '12px';
      container.appendChild(el);
      
      setTimeout(() => { if(el.parentNode) el.remove(); }, 500);
    }
    
    function shoot() {
      const el = document.createElement('div');
      el.className = 'bullet';
      
      const x = state.cannonX + CANNON_W / 2 - 4; // center bullet
      const y = FLOOR_Y - 50 - 25; // above cannon barrel
      
      container.appendChild(el);
      state.bullets.push({x, y, el});
    }
    
    function draw() {
      cannonEl.style.left = state.cannonX + 'px';
      
      state.bullets.forEach(b => {
        b.el.style.left = b.x + 'px';
        b.el.style.top = b.y + 'px';
      });
      
      state.balls.forEach(b => {
        b.el.style.left = b.x + 'px';
        b.el.style.top = b.y + 'px';
      });
      
      state.drops.forEach(d => {
        d.el.style.left = d.x + 'px';
        d.el.style.top = d.y + 'px';
      });
    }
    
    function gameOver() {
        state.running = false;
        saveProgress(); // Save up to game over
        gameOverScreen.style.display = 'flex';
        levelProgressContainer.style.display = 'none';
    }
    
    function levelComplete() {
        state.running = false;
        saveProgress();
        victoryScreen.style.display = 'flex';
    }
    
    // Start!
    init();
  </script>
</body>
</html>
