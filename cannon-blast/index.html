<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannon Blast</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    #game-container {
      position: relative;
      width: 600px;
      height: 800px;
      background: #222;
      border: 2px solid #444;
      border-radius: 8px;
      overflow: hidden;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
      pointer-events: none;
    }
    .stat-box {
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 4px;
      font-weight: bold;
    }
    #coins { color: #ffd700; }
    #score { color: #fff; }
    
    #upgrades-panel {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      display: flex;
      justify-content: space-around;
      z-index: 20;
      border-top: 1px solid #444;
    }
    .upgrade-btn {
      background: #333;
      color: white;
      border: 1px solid #555;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      transition: background 0.2s;
      font-family: 'Outfit', sans-serif;
    }
    .upgrade-btn:hover:not(:disabled) { background: #444; }
    .upgrade-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .upgrade-cost { color: #ffd700; font-weight: bold; display: block; margin-top: 4px; }
    .stat-info { display: block; font-size: 11px; color: #94a3b8; margin: 2px 0; }
    .stat-info span { color: #fff; font-weight: 600; }
    
    #level-progress-container {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      background: #333;
      border: 2px solid #555;
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
    }
    #level-progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4a90e2, #2962ff);
      transition: width 0.3s;
    }
    #level-text {
      position: absolute;
      top: -2px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
    }
    
    .screen-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    .screen-overlay h2 { font-size: 32px; margin-bottom: 20px; text-shadow: 0 4px 6px rgba(0,0,0,0.5); }
    .screen-btn {
      padding: 10px 20px;
      font-size: 18px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
      min-width: 150px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: transform 0.1s, background 0.2s;
    }
    .screen-btn:hover { background: #357abd; transform: translateY(-2px); }
    
    #game-over h2 { color: #ff4444; }
    #victory-screen h2 { color: #ffd700; }
    #main-menu h2 { color: #fff; font-size: 40px; margin-bottom: 40px; }
    
    #cannon {
      position: absolute;
      bottom: 60px; /* Above upgrades panel */
      left: 175px;
      width: 60px;
      height: 40px;
      background: linear-gradient(180deg, #4a90e2, #2962ff);
      border-radius: 8px 8px 4px 4px;
      display: flex;
      justify-content: center;
      z-index: 5;
      box-shadow: inset 0 2px 5px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.5);
      transition: background 0.3s;
    }
    
    /* Cannon Skins */
    #cannon.skin-crimson { background: linear-gradient(180deg, #e53935, #b71c1c); }
    #cannon.skin-crimson .cannon-barrel { background: linear-gradient(90deg, #444 0%, #888 50%, #444 100%); }
    #cannon.skin-crimson::before, #cannon.skin-crimson::after { border-color: #ff5252; }
    
    #cannon.skin-gold { background: linear-gradient(180deg, #ffd700, #ff8f00); }
    #cannon.skin-gold .cannon-barrel { background: linear-gradient(90deg, #ffe066 0%, #fff 50%, #ffe066 100%); border-color: #b8860b; }
    #cannon.skin-gold .cannon-barrel::after { background: #b8860b; }
    #cannon.skin-gold::before, #cannon.skin-gold::after { border-color: #ffd700; background: radial-gradient(circle at center, #ffe066 30%, #555 60%, #111 100%); }
    
    #cannon.skin-neon { background: linear-gradient(180deg, #00e5ff, #2979ff); box-shadow: 0 0 15px #00e5ff; }
    #cannon.skin-neon .cannon-barrel { background: #111; border-color: #00e5ff; box-shadow: 0 0 10px #00e5ff; }
    #cannon.skin-neon .cannon-barrel::after { background: #00e5ff; }
    #cannon.skin-neon::before, #cannon.skin-neon::after { border-color: #00e5ff; background: #111; box-shadow: 0 0 10px #00e5ff; }

    #cannon::before { /* Left wheel */
      content: '';
      position: absolute;
      bottom: -10px;
      left: -5px;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle at center, #777 30%, #222 60%, #111 100%);
      border-radius: 50%;
      border: 2px solid #555;
      z-index: 6;
      box-shadow: 0 4px 5px rgba(0,0,0,0.6);
    }
    #cannon::after { /* Right wheel */
      content: '';
      position: absolute;
      bottom: -10px;
      right: -5px;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle at center, #777 30%, #222 60%, #111 100%);
      border-radius: 50%;
      border: 2px solid #555;
      z-index: 6;
      box-shadow: 0 4px 5px rgba(0,0,0,0.6);
    }
    .cannon-barrel { /* Cannon barrel */
      position: absolute;
      top: -25px;
      width: 20px;
      height: 35px;
      background: linear-gradient(90deg, #555 0%, #aaa 50%, #555 100%);
      border-radius: 4px;
      z-index: 4;
      border: 1px solid #333;
      border-bottom: none;
    }
    .cannon-barrel::after {
      content: '';
      position: absolute;
      top: -5px;
      left: -2px;
      width: 22px;
      height: 8px;
      background: #333;
      border-radius: 2px;
      border: 1px solid #111;
    }
    
    .bullet {
      position: absolute;
      width: 8px;
      height: 16px;
      background: #000;
      border-radius: 4px;
      z-index: 4;
      border: 1px solid #444;
    }
    
    #shield-visual {
      position: absolute;
      width: 80px;
      height: 40px;
      border: 4px solid rgba(74, 144, 226, 0.6);
      border-bottom: none;
      border-radius: 50% 50% 0 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.3s;
      opacity: 0;
      filter: drop-shadow(0 0 8px #4a90e2);
    }
    #shield-visual.active {
      opacity: 1;
    }
    
    .hit-text {
      position: absolute;
      color: white;
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
      animation: floatUp 0.5s ease-out forwards;
      text-shadow: 1px 1px 2px #000;
    }
    .hit-text.crit {
      color: #ffaa00;
      font-size: 20px !important;
      text-shadow: 0 0 5px #ff0000, 1px 1px 2px #000;
      z-index: 11;
    }
    
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-30px) scale(1.5); opacity: 0; }
    }
    
    .ball {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      z-index: 3;
      box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 10px rgba(0,0,0,0.5);
    }
    
    .ball.freeze {
      background: radial-gradient(circle at 30% 30%, #00ffff, #0055ff) !important;
      box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 15px rgba(0,255,255,0.8);
      border: 2px solid #fff;
    }
    
    .coin-drop {
      position: absolute;
      width: 15px;
      height: 15px;
      background: radial-gradient(circle, #ffe066 0%, #ffb300 100%);
      border-radius: 50%;
      z-index: 2;
      border: 1px solid #ff8800;
      animation: coinSpin 1s linear infinite;
    }
    
    @keyframes coinSpin {
      0% { transform: scaleX(1); }
      50% { transform: scaleX(0.2); }
      100% { transform: scaleX(1); }
    }
    
    .boss {
      position: absolute;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at 30% 30%, #ff5252, #8b0000);
      border-radius: 20px; /* Square with rounded corners */
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 24px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      z-index: 8;
      box-shadow: 0 0 20px rgba(255,0,0,0.5), inset -10px -10px 20px rgba(0,0,0,0.5);
      border: 3px solid #ffaaaa;
      overflow: hidden;
    }
    
    .boss::before {
      content: '';
      position: absolute;
      top: 20px; left: 20px;
      width: 30px; height: 30px;
      background: #000;
      border-radius: 50%;
      box-shadow: 50px 0 0 #000;
    }
    
    .boss-warning {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff0000;
      font-size: 40px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff0000, 2px 2px 0 #fff;
      animation: flash 0.2s infinite alternate;
      z-index: 9;
      pointer-events: none;
    }
    
    @keyframes flash {
      from { opacity: 1; transform: translateX(-50%) scale(1); }
      to { opacity: 0.5; transform: translateX(-50%) scale(1.2); }
    }

    /* Mobile Controls */
    #mobile-slider-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 40px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      border: 1px solid #4a90e2;
      box-shadow: 0 0 15px rgba(74, 144, 226, 0.3);
      z-index: 25;
      display: none; /* Shown via JS */
    }
    #mobile-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      outline: none;
    }
    #mobile-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 30px;
      height: 30px;
      background: #4a90e2;
      border: 2px solid #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(74, 144, 226, 0.8);
    }

    /* Backgrounds */
    #game-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: linear-gradient(to bottom, #1a2a44 0%, #3a5a84 100%);
    }
    .parallax-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      filter: blur(20px);
    }
    .snow-particle {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0.8;
      pointer-events: none;
    }
    @keyframes heatHaze {
      0% { transform: translateY(0) skewX(0deg); }
      50% { transform: translateY(-5px) skewX(2deg); }
      100% { transform: translateY(0) skewX(0deg); }
    }
    .heat-haze {
      position: absolute;
      bottom: 0; width: 100%; height: 200px;
      background: linear-gradient(to top, rgba(255, 69, 0, 0.2), transparent);
      filter: blur(8px);
      animation: heatHaze 2s infinite alternate ease-in-out;
    }

    /* Snowy Mountains Background */
    .bg-mountains .mountain {
      position: absolute;
      bottom: 60px;
      width: 0;
      height: 0;
      border-left: 150px solid transparent;
      border-right: 150px solid transparent;
      border-bottom: 200px solid #4a5a74;
    }
    .bg-mountains .mountain-1 { left: -50px; bottom: 60px; opacity: 0.8; }
    .bg-mountains .mountain-2 { right: -50px; bottom: 80px; transform: scale(1.2); opacity: 0.6; }
    .bg-mountains .mountain-3 { left: 150px; bottom: 50px; transform: scale(0.8); opacity: 0.9; }

    .bg-mountains .peak {
      position: absolute;
      top: 0;
      left: -150px;
      width: 0;
      height: 0;
      border-left: 150px solid transparent;
      border-right: 150px solid transparent;
      border-bottom: 60px solid #fff;
    }

    /* Void Space Background */
    .bg-space {
      background: radial-gradient(circle at center, #111 0%, #000 100%) !important;
    }
    .bg-space::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: radial-gradient(#fff 1px, transparent 1px);
      background-size: 50px 50px;
      background: #02040a;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: var(--op);
    }
    .nebula {
      position: absolute;
      width: 400px; height: 400px;
      filter: blur(80px);
      opacity: 0.15;
      border-radius: 50%;
    }

    /* Magma Pit Background */
    .bg-lava {
      background: #1a0800;
    }
    .lava-glow {
      position: absolute;
      bottom: 0; width: 100%; height: 60%;
      background: radial-gradient(circle at 50% 100%, #ff4500 0%, transparent 70%);
      opacity: 0.3;
    }
    .ember {
      position: absolute;
      background: #ff8800;
      width: 2px; height: 2px;
      border-radius: 50%;
      box-shadow: 0 0 4px #ff4400;
    }
    .bg-lava::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 150px;
      background: linear-gradient(to top, #ff4500 0%, transparent 100%);
      opacity: 0.4;
      filter: blur(20px);
      animation: pulse-glow 3s ease-in-out infinite alternate;
    }
    @keyframes pulse-glow {
      from { opacity: 0.3; }
      to { opacity: 0.6; }
    }

    .shop-section {
      width: 90%;
      margin: 10px 0;
      background: rgba(0,0,0,0.5);
      padding: 15px;
      border-radius: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .shop-section h3 { width: 100%; text-align: center; margin-bottom: 10px; color: #4a90e2; }

    #shop-screen h2 { color: #4a90e2; margin-top: 40px; }
    
    #open-shop-btn {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 80px !important;
      height: 80px;
      min-width: 0 !important;
      border-radius: 50% !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 14px !important;
      padding: 5px !important;
      background: #eab308;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      border: 2px solid #fff;
    }
    
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
      padding: 0.6rem 1.2rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      color: #94a3b8;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    .back-btn:hover { 
      color: white; 
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.2);
    }
    </style>
</head>
<body>
  <a href="../" class="back-btn">← Arcade Hub</a>
  <div id="game-container">
    <div id="game-background" class="bg-mountains">
      <div id="bg-layer-far" class="parallax-layer"></div>
      <div id="bg-layer-mid" class="parallax-layer"></div>
      <div id="bg-layer-near" class="parallax-layer"></div>
      <div id="vfx-overlay" class="parallax-layer"></div>
    </div>
    
    <div id="ui-layer">
      <div class="stat-box">Coins: <span id="coins">0</span></div>
    </div>
    
    <div id="level-progress-container" style="display: none;">
      <div id="level-progress-fill"></div>
      <div id="level-text">Level 1</div>
    </div>
    
    <div id="mobile-slider-container">
      <input type="range" id="mobile-slider" min="0" max="100" value="50">
    </div>

    <div id="cannon">
      <div id="shield-visual"></div>
      <div class="cannon-barrel"></div>
    </div>
    
    <div id="main-menu" class="screen-overlay">
      <h2>Cannon Blast</h2>
      
      <div id="upgrades-panel">
        <button class="upgrade-btn" id="upg-damage">
          <div>Damage: <span id="val-damage">1</span> DMG</div>
          <span class="upgrade-cost" id="cost-damage">10</span>
        </button>
        <button class="upgrade-btn" id="upg-firerate">
          <div>Fire Rate: <span id="val-firerate">2.5</span>/sec</div>
          <span class="upgrade-cost" id="cost-firerate">10</span>
        </button>
        <button class="upgrade-btn" id="upg-crit">
          <div>Crit Chance: <span id="val-crit">2</span>%</div>
          <span class="upgrade-cost" id="cost-crit">15</span>
        </button>
      </div>
      
      <button class="screen-btn" id="play-btn" style="margin-top: 20px; font-size: 24px;">Play</button>
      <button class="screen-btn" id="open-shop-btn">
        <span style="font-size: 24px;">🛒</span>
        <span>SHOP</span>
      </button>
      <button class="screen-btn" id="reset-progress-btn" style="margin-top: 10px; background: #64748b; font-size: 14px; min-width: 120px;">Reset Progress</button>
    </div>

    <div id="shop-screen" class="screen-overlay" style="display: none;">
      <button class="screen-btn" id="close-shop-btn">← Back</button>
      <h2>The Shop</h2>
      <div id="shop-content" style="width: 100%; display: flex; flex-direction: column; align-items: center; overflow-y: auto; max-height: 70vh;">
        <!-- Generated via JS -->
      </div>
    </div>
    
    <div id="game-over" class="screen-overlay" style="display: none;">
      <h2>Game Over</h2>
      <button class="screen-btn" id="restart-btn">Try Again</button>
      <button class="screen-btn" id="menu-btn-go">Main Menu</button>
    </div>
    
    <div id="victory-screen" class="screen-overlay" style="display: none;">
      <h2>Level Cleared!</h2>
      <button class="screen-btn" id="next-level-btn">Next Level</button>
      <button class="screen-btn" id="menu-btn-vic">Main Menu</button>
    </div>
  </div>

  <script>
    const container = document.getElementById('game-container');
    const cannonEl = document.getElementById('cannon');
    const coinsEl = document.getElementById('coins');
    const mainMenuScreen = document.getElementById('main-menu');
    const gameOverScreen = document.getElementById('game-over');
    const victoryScreen = document.getElementById('victory-screen');
    const shopScreen = document.getElementById('shop-screen');
    const shopContent = document.getElementById('shop-content');
    const upgradesPanel = document.getElementById('upgrades-panel');
    const gameBg = document.getElementById('game-background');
    const levelProgressContainer = document.getElementById('level-progress-container');
    const levelProgressFill = document.getElementById('level-progress-fill');
    const levelText = document.getElementById('level-text');
    const vfxOverlay = document.getElementById('vfx-overlay');
    const bgLayerFar = document.getElementById('bg-layer-far');
    const bgLayerMid = document.getElementById('bg-layer-mid');
    const bgLayerNear = document.getElementById('bg-layer-near');
    
    // Game constants
    const GAME_W = 600;
    const GAME_H = 800;
    const CANNON_W = 60;
    const FLOOR_Y = 740; // Above upgrades panel
    const GRAVITY = 0.15;
    const BOSS_W = 120;
    const BOSS_H = 120;
    
    // State
    let state = {
      running: false,
      cannonX: 270,
      coins: 0,
      
      // Progression
      level: 1,
      ballsSpawnedThisLevel: 0,
      ballsDestroyedThisLevel: 0,
      totalBallsForLevel: 10,
      maxBallsOnScreen: 5,
      freezeEndTime: 0,
      isBossLevel: false,
      boss: null,
      
      // Cannon stats
      damage: 1,
      fireRate: 400, // ms between shots
      critChance: 2, // percentage
      lastShotTime: 0,
      
      // Upgrades
      damageLvl: 1,
      fireRateLvl: 1,
      critLvl: 1,
      damageCost: 10,
      fireRateCost: 10,
      critCost: 15,
      
      // Cosmetics
      unlockedSkins: ['default'],
      equippedSkin: 'default',
      unlockedBackgrounds: ['bg-mountains'],
      equippedBackground: 'bg-mountains',
      
      // Advanced Upgrades
      multiShotLvl: 1, // 1 = 1 bullet, 2 = 2 bullets, etc (max 3)
      multiShotCost: 100,
      bulletSizeLvl: 1, // scales bullet size
      bulletSizeCost: 75,
      projSpeedLvl: 1, // scales bullet speed
      projSpeedCost: 75,
      shockwaveLvl: 0, // 1 = every 10th shot explosive
      shockwaveCost: 200,

    // --- SFX Engine (Procedural) ---
    class SFXManager {
      constructor() {
        this.ctx = null;
        this.enabled = true;
      }
      init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
      play(type) {
        if (!this.enabled || !this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        const now = this.ctx.currentTime;
        
        switch(type) {
          case 'shoot':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
            break;
          case 'pop':
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.05);
            osc.start(); osc.stop(now + 0.05);
            break;
          case 'crit':
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1200, now);
            osc.frequency.exponentialRampToValueAtTime(400, now + 0.15);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(); osc.stop(now + 0.15);
            break;
          case 'explosion':
            this.playNoise(now, 0.3, 0.2);
            break;
          case 'pickup':
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.linearRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
            break;
        }
      }
      playNoise(time, duration, volume) {
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(volume, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
        noise.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start(time);
        noise.stop(time + duration);
      }
    }

    // --- Particle System ---
    class ParticleSystem {
      constructor() {
        this.particles = [];
      }
      spawn(x, y, color, count = 8, type = 'debris') {
        for (let i = 0; i < count; i++) {
          const el = document.createElement('div');
          el.style.position = 'absolute';
          el.style.left = x + 'px';
          el.style.top = y + 'px';
          el.style.backgroundColor = color || '#fff';
          el.style.width = random(3, 6) + 'px';
          el.style.height = el.style.width;
          el.style.borderRadius = '2px';
          el.style.pointerEvents = 'none';
          el.style.zIndex = '5';
          vfxOverlay.appendChild(el);
          
          this.particles.push({
            el,
            x, y,
            vx: random(-4, 4),
            vy: random(-6, 2),
            life: 1.0,
            decay: random(0.02, 0.05)
          });
        }
      }
      update() {
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15; // particle gravity
          p.life -= p.decay;
          
          if (p.life <= 0) {
            p.el.remove();
            this.particles.splice(i, 1);
          } else {
            p.el.style.transform = `translate3d(${p.x - 5}px, ${p.y - 5}px, 0) scale(${p.life})`;
            p.el.style.opacity = p.life;
          }
        }
      }
    }

          document.getElementById('val-firerate').textContent = (1000 / state.fireRate).toFixed(1);
          document.getElementById('val-crit').textContent = state.critChance;
          
          // Apply initial forcefield state
          state.hasForceField = state.forceFieldLvl > 0;
          
          if (!state.unlockedSkins) state.unlockedSkins = ['default'];
          if (!state.equippedSkin) state.equippedSkin = 'default';
          if (!state.unlockedBackgrounds) state.unlockedBackgrounds = ['bg-mountains'];
          if (!state.equippedBackground) state.equippedBackground = 'bg-mountains';
          
          // Apply initial forcefield state
          state.hasForceField = state.forceFieldLvl > 0;
          
          applySkin();
          applyBackground();
          updateUI();
        } catch(e) { console.error('Save data corrupted', e); }
      }
    }
    
    // Upgrades
    function upgradeDamage() {
      if (state.coins >= state.damageCost) {
        state.coins -= state.damageCost;
        state.damage += 1;
        state.damageLvl += 1;
        state.damageCost = Math.floor(state.damageCost * 1.5);
        document.getElementById('cost-damage').textContent = state.damageCost;
        document.getElementById('val-damage').textContent = state.damage;
        updateUI();
        saveProgress();
      }
    }
    
    function upgradeFireRate() {
      if (state.coins >= state.fireRateCost && state.fireRate > 50) {
        state.coins -= state.fireRateCost;
        state.fireRate = Math.max(50, state.fireRate * 0.92);
        state.fireRateLvl += 1;
        state.fireRateCost = Math.floor(state.fireRateCost * 1.5);
        
        if (state.fireRate <= 50) {
            document.getElementById('cost-firerate').textContent = 'MAX';
            document.getElementById('upg-firerate').disabled = true;
        } else {
            document.getElementById('cost-firerate').textContent = state.fireRateCost;
        }
        document.getElementById('val-firerate').textContent = (1000 / state.fireRate).toFixed(1);
        updateUI();
        saveProgress();
      }
    }
    
    function upgradeCrit() {
      if (state.coins >= state.critCost) {
        state.coins -= state.critCost;
        state.critChance += 2;
        state.critLvl += 1;
        state.critCost = Math.floor(state.critCost * 1.5);
        document.getElementById('cost-crit').textContent = state.critCost;
        document.getElementById('val-crit').textContent = state.critChance;
        updateUI();
        saveProgress();
      }
    }
    
    function updateUI() {
      coinsEl.textContent = state.coins;
      
      document.getElementById('upg-damage').disabled = state.coins < state.damageCost;
      document.getElementById('upg-crit').disabled = state.coins < state.critCost;
      if (state.fireRate > 50) {
        document.getElementById('upg-firerate').disabled = state.coins < state.fireRateCost;
      }
      
      // Update shop buttons live if shop is open
      if (shopScreen.style.display !== 'none') {
        renderShop();
      }
      
      // Force Field visual
      const shieldVisual = document.getElementById('shield-visual');
      if (state.hasForceField) {
        shieldVisual.classList.add('active');
        cannonEl.style.boxShadow = '0 0 15px #4a90e2, inset 0 0 10px #4a90e2';
      } else {
        shieldVisual.classList.remove('active');
        cannonEl.style.boxShadow = '';
      }
    }
    
    function updateProgressBar() {
      let pct = 0;
      if (state.isBossLevel && state.boss) {
          pct = Math.max(0, (state.boss.hp / state.boss.maxHp) * 100);
      } else {
          pct = Math.min(100, (state.ballsDestroyedThisLevel / state.totalBallsForLevel) * 100);
      }
      levelProgressFill.style.width = pct + '%';
    }
    
    // Spawners
    function spawnLevelBall() {
      if (!state.running) return;
      if (state.isBossLevel) return; // Boss handles its own minions
      if (state.ballsDestroyedThisLevel >= state.totalBallsForLevel) return; // Stop spawning when progress is full
      if (state.ballsSpawnedThisLevel >= state.totalBallsForLevel) return;
      if (state.balls.length >= state.maxBallsOnScreen) return; // Hard limit 5
      
      state.ballsSpawnedThisLevel++;
      
      const side = Math.random() > 0.5 ? 1 : -1; // 1 = right, -1 = left
      const radius = random(30, 45); // Vary sizes slightly for initial spawns
      const x = side === 1 ? GAME_W + radius : -radius;
      const y = random(100, 250);
      const vx = side === 1 ? random(-3.5, -1.5) : random(1.5, 3.5);
      const vy = random(-3, -1); // upward arc
      
      // Base HP scales with level
      const baseHp = 10 + ((state.level - 1) * 5);
      
      // 5% chance for a freeze ball
      const type = Math.random() < 0.05 ? 'freeze' : 'normal';
      
      createBall(x, y, vx, vy, radius, baseHp, type);
    }
    
    function createBall(x, y, vx, vy, radius, hp, type = 'normal') {
      const el = document.createElement('div');
      el.className = 'ball' + (type === 'freeze' ? ' freeze' : '');
      
      if (type !== 'freeze') {
        const color = colors[Math.floor(Math.random() * colors.length)];
        el.style.background = `radial-gradient(circle at 30% 30%, ${color}, #000)`;
      }
      
      el.style.width = (radius * 2) + 'px';
      el.style.height = (radius * 2) + 'px';
      el.innerText = hp;
      
      container.appendChild(el);
      
      state.balls.push({
        x, y, vx, vy, radius, hp, maxHp: hp, el, type
      });
    }
    
    function spawnDrop(x, y, amount) {
        for(let i=0; i<Math.min(amount, 10); i++) { // cap visuals to 10 max
            const el = document.createElement('div');
            el.className = 'coin-drop';
            container.appendChild(el);
            
            state.drops.push({
                x, y,
                vx: random(-3, 3),
                vy: random(-5, -2),
                el
            });
        }
        // Immediately add coins (visuals drop to bottom)
        state.coins += amount;
        updateUI();
    }
    
    // Loop
    function gameLoop(timestamp) {
      if (!state.running) return;
      
      update(timestamp);
      particles.update();
      draw(timestamp);
      
      requestAnimationFrame(gameLoop);
    }
    
    function update(timestamp) {
      // Player movement
      const speed = 12;
      if (state.keys['ArrowLeft'] || state.keys['KeyA']) state.cannonX -= speed;
      if (state.keys['ArrowRight'] || state.keys['KeyD']) state.cannonX += speed;
      
      // Clamp cannon
      state.cannonX = Math.max(0, Math.min(GAME_W - CANNON_W, state.cannonX));
      
      // Shooting
      const isKeyboardShooting = state.keys['ArrowUp'] || state.keys['KeyW'] || state.keys['Space'];
      if ((state.isShooting || isKeyboardShooting) && timestamp - state.lastShotTime > state.fireRate) {
        state.lastShotTime = timestamp;
        shoot();
      }
      
      // Update bullets
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        b.y -= 10;
        
        // Remove offscreen
        if (b.y < -20) {
          b.el.remove();
          state.bullets.splice(i, 1);
        }
      }
      
      // Update Boss
      if (state.isBossLevel && state.boss) {
         const boss = state.boss;
         
         if (boss.phase === 'hover') {
             boss.x += boss.vx;
             if (boss.x <= 0 || boss.x + BOSS_W >= GAME_W) boss.vx *= -1;
             
             // Spawn minions in bursts
             if (!boss.lastSpawnTime) boss.lastSpawnTime = timestamp;
             if (timestamp > boss.lastSpawnTime + 3000 && state.balls.length < state.maxBallsOnScreen) {
                 boss.lastSpawnTime = timestamp;
                 const spawnCount = 3 + Math.floor(state.level / 2);
                 for (let i = 0; i < spawnCount; i++) {
                     const radius = random(15, 35);
                     const hp = Math.max(1, Math.floor(state.level * 2));
                     createBall(boss.x + BOSS_W/2, boss.y + BOSS_H, random(-3, 3), 2, radius, hp, 'normal');
                 }
             }
             
             // Trigger slam randomly
             if (Math.random() < 0.005) {
                 boss.phase = 'warning';
                 boss.timer = timestamp + 1000;
                 boss.warningEl = document.createElement('div');
                 boss.warningEl.className = 'boss-warning';
                 boss.warningEl.innerText = '!';
                 boss.el.appendChild(boss.warningEl);
             }
         } else if (boss.phase === 'warning') {
             // Track player slightly
             const targetX = state.cannonX + CANNON_W/2 - BOSS_W/2;
             boss.x += (targetX - boss.x) * 0.05;
             
             if (timestamp > boss.timer) {
                 boss.phase = 'slam';
                 boss.vy = 15;
                 if (boss.warningEl) {
                     boss.warningEl.remove();
                     boss.warningEl = null;
                 }
             }
         } else if (boss.phase === 'slam') {
             boss.y += boss.vy;
             
             // Collision with cannon
             if (boss.y + BOSS_H > FLOOR_Y - 50 && boss.x < state.cannonX + CANNON_W && boss.x + BOSS_W > state.cannonX) {
                 gameOver();
                 return;
             }
             
             if (boss.y + BOSS_H >= FLOOR_Y) {
                 boss.y = FLOOR_Y - BOSS_H;
                 boss.phase = 'wait';
                 boss.timer = timestamp + 1000;
             }
         } else if (boss.phase === 'wait') {
             if (timestamp > boss.timer) {
                 boss.phase = 'return';
             }
         } else if (boss.phase === 'return') {
             boss.y -= 3;
             if (boss.y <= 50) {
                 boss.y = 50;
                 boss.phase = 'hover';
             }
         }
         
         // Boss Bullet Collision
         for (let j = state.bullets.length - 1; j >= 0; j--) {
             const bullet = state.bullets[j];
             const bx = bullet.x + 4;
             const by = bullet.y + 8;
             
             if (bx > boss.x && bx < boss.x + BOSS_W && by > boss.y && by < boss.y + BOSS_H) {
                 // Hit Boss
                 let finalDamage = state.damage;
                 let critMultiplier = 1 + Math.floor(state.critChance / 100);
                 let extraCritChance = state.critChance % 100;
                 let isCrit = false;
                 
                 if (Math.random() < (extraCritChance / 100)) critMultiplier++;
                 if (critMultiplier > 1) { isCrit = true; finalDamage *= critMultiplier; }
                 boss.hp -= finalDamage;
                 boss.el.innerText = Math.ceil(boss.hp);
                 showHitText(bx, by, finalDamage, isCrit);
                 sfx.play(isCrit ? 'crit' : 'pop');
                 particles.spawn(bx, by, '#fff', isCrit ? 8 : 4);
                 
                 bullet.el.remove();
                 state.bullets.splice(j, 1);
                 
                 boss.el.style.filter = 'brightness(2)';
                 setTimeout(() => { if(boss.el) boss.el.style.filter = 'none'; }, 50);
                 
                 updateProgressBar();
                 
                 if (boss.hp <= 0) {
                     // Boss Defeated
                     sfx.play('explosion');
                     shakeScreen(15);
                     particles.spawn(boss.x + BOSS_W/2, boss.y + BOSS_H/2, '#ef4444', 30);
                     spawnDrop(boss.x + BOSS_W/2, boss.y + BOSS_H/2, 20);
                     boss.el.remove();
                     state.boss = null;
                     
                     // Clear remaining minions
                     [...state.balls].forEach((b, idx) => {
                         spawnDrop(b.x, b.y, 1);
                         b.el.remove();
                     });
                     state.balls = [];
                     
                     levelComplete();
                     return;
                 }
                 break;
             }
         }
         
         if (boss) {
             boss.el.style.left = boss.x + 'px';
             boss.el.style.top = boss.y + 'px';
         }
      }
      
      // Update drops
      for (let i = state.drops.length - 1; i >= 0; i--) {
        const d = state.drops[i];
        d.vy += GRAVITY * 1.5;
        d.x += d.vx;
        d.y += d.vy;
        
        if (d.y > FLOOR_Y) {
            d.el.remove();
            state.drops.splice(i, 1);
        }
      }
      
      // Update balls
      for (let i = state.balls.length - 1; i >= 0; i--) {
        const b = state.balls[i];
        
        // Physics only run if not frozen
        if (Date.now() >= state.freezeEndTime) {
            b.vy += GRAVITY;
            b.x += b.vx;
            b.y += b.vy;
        }
        
        // Bounce off walls (only if fully inside screen to prevent getting stuck when spawning)
        if (b.x > 0 && b.x + b.radius * 2 < GAME_W) {
            // Check collisions with bullets here so we don't skip physics if it dies
            let destroyed = false;
            for (let j = state.bullets.length - 1; j >= 0; j--) {
              const bullet = state.bullets[j];
              
              // Bullet center
              const bx = bullet.x + 4;
              const by = bullet.y + 8;
              
              // Ball center
              const ballCx = b.x + b.radius;
              const ballCy = b.y + b.radius;
              
              if (bullet.hitBalls && bullet.hitBalls.includes(i)) continue; // Already hit this ball
              
              const distSq = (bx - ballCx)**2 + (by - ballCy)**2;
              
              if (distSq < (b.radius + 4)**2) {
                if (bullet.hitBalls) bullet.hitBalls.push(i); // Mark as hit

                // Hit! Calculate Damage and Crits
                let finalDamage = state.damage;
                let critMultiplier = 1 + Math.floor(state.critChance / 100);
                let extraCritChance = state.critChance % 100;
                
                let isCrit = false;
                if (Math.random() < (extraCritChance / 100)) {
                   critMultiplier++;
                }
                
                if (critMultiplier > 1) {
                  isCrit = true;
                  finalDamage *= critMultiplier;
                }
                b.hp -= finalDamage;
                b.el.innerText = Math.ceil(b.hp);
                
                // Show floating hit text
                showHitText(b.x + b.radius, b.y, finalDamage, isCrit);
                sfx.play(isCrit ? 'crit' : 'pop');
                particles.spawn(b.x + b.radius, b.y + b.radius, b.color, isCrit ? 10 : 5);
                
                // Visual hit flash
                b.el.style.filter = 'brightness(2)';
                setTimeout(() => { if(b.el) b.el.style.filter = 'none'; }, 50);
                
                // Piercing Bullets logic
                if (bullet.pierce > 0) {
                  bullet.pierce--;
                } else {
                  // Shockwave logic
                  if (bullet.isExplosive) {
                    const radius = 80;
                    particles.spawn(ballCx, ballCy, '#ff4400', 15);
                    state.balls.forEach((otherBall, otherIdx) => {
                      if (otherBall !== b) {
                        const dx = (otherBall.x + otherBall.radius) - ballCx;
                        const dy = (otherBall.y + otherBall.radius) - ballCy;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < radius) {
                          otherBall.hp -= finalDamage * 0.5; // Splash damage
                          otherBall.el.innerText = Math.ceil(otherBall.hp);
                        }
                      }
                    });
                  }
                  
                  // Remove bullet if no bounces left
                  bullet.el.remove();
                  state.bullets.splice(j, 1);
                }
                
                if (b.hp <= 0) {
                  destroyBall(i);
                  destroyed = true;
                  break; // Ball destroyed, stop checking bullets for this ball
                }
              }
            }
            if (destroyed) continue; // Skip rest of loop for this ball
        } else if (b.x <= 0 && b.vx < 0) {
            b.x = 0;
            b.vx *= -1;
        } else if (b.x + b.radius * 2 >= GAME_W && b.vx > 0) {
            b.x = GAME_W - b.radius * 2;
            b.vx *= -1;
        }
        
        // Bounce off floor
        if (b.y + b.radius * 2 > FLOOR_Y) {
          b.y = FLOOR_Y - b.radius * 2;
          b.vy *= -1.02; // Bounciness (slightly higher than 1 to overcome gravity decay and bounce high)
          
          // Minimum bounce height
          if (Math.abs(b.vy) < 4) b.vy = -8;
        }
        
        // Check collisions with player cannon AABB (state.cannonX to state.cannonX + CANNON_W, y=FLOOR_Y-50 to FLOOR_Y)
        const cannonRect = { x: state.cannonX, y: FLOOR_Y - 50, w: CANNON_W, h: 50 };
        const ballCx = b.x + b.radius;
        const ballCy = b.y + b.radius;
        
        // Find closest point on AABB to circle
        const closestX = Math.max(cannonRect.x, Math.min(ballCx, cannonRect.x + cannonRect.w));
        const closestY = Math.max(cannonRect.y, Math.min(ballCy, cannonRect.y + cannonRect.h));
        
        const dx = ballCx - closestX;
        const dy = ballCy - closestY;
        const distSqP = dx*dx + dy*dy;
        
        // Repulsor Upgrade
        if (state.repulsorLvl > 0 && distSqP < (b.radius + 60)**2) {
          if (ballCy < closestY) { // Only if ball is above
            b.vy -= (state.repulsorLvl * 0.2); // Push away
          }
        }

        if (distSqP < (b.radius)**2) {
          if (state.hasForceField) {
            state.hasForceField = false;
            b.vy = -12; // Bounce the ball away
            b.y -= 20;
            particles.spawn(ballCx, ballCy, '#4a90e2', 20);
            sfx.play('explosion');
            shakeScreen(10);
          } else {
            gameOver();
            return;
          }
        }
      }
      
      // Update bullets
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const b = state.bullets[i];
        b.y += (b.vy || -10);
        
        if (b.y < -50) {
          b.el.remove();
          state.bullets.splice(i, 1);
        }
      }
    }
    
    function destroyBall(index) {
      const b = state.balls[index];
      
      sfx.play('explosion');
      particles.spawn(b.x + b.radius, b.y + b.radius, b.color, 15);
      spawnDrop(b.x + b.radius, b.y + b.radius, Math.ceil(b.maxHp / 2));
      
      // Activate powerups
      if (b.type === 'freeze') {
         state.freezeEndTime = Date.now() + 5000;
         showHitText(GAME_W / 2, GAME_H / 2, 'FREEZE!', true);
      }
      
      // Split if radius is big enough and we won't exceed screen limit massively
      // We allow standard splits even if it slightly exceeds 5 momentarily
      if (b.radius > 30) {
        const newRadius = b.radius * 0.6;
        const newHp = Math.max(1, Math.floor(b.maxHp * 0.4));
        
        // Split into 2
        createBall(b.x, b.y, b.vx - 1.5, -4, newRadius, newHp);
        createBall(b.x + b.radius, b.y, b.vx + 1.5, -4, newRadius, newHp);
      } else {
        // Only count as destroyed for level progress if it can no longer split
        state.ballsDestroyedThisLevel++;
        updateProgressBar();
      }
      
      b.el.remove();
      state.balls.splice(index, 1);
      updateUI();
      
      // Check win condition
      if (!state.isBossLevel && state.ballsDestroyedThisLevel >= state.totalBallsForLevel && state.balls.length === 0) {
        levelComplete();
      }
    }
    
    function showHitText(x, y, damage, isCrit) {
      const el = document.createElement('div');
      el.className = 'hit-text' + (isCrit ? ' crit' : '');
      el.innerText = damage;
      el.style.left = (x + random(-10, 10)) + 'px';
      el.style.top = (y + random(-10, 10)) + 'px';
      el.style.fontSize = isCrit ? '18px' : '12px';
      container.appendChild(el);
      
      setTimeout(() => { if(el.parentNode) el.remove(); }, 500);
    }
    
    function shoot() {
      const bulletCount = Math.min(3, state.multiShotLvl);
      const spreads = [0, -15, 15]; // offsets for multishot
      
      for (let i = 0; i < bulletCount; i++) {
        sfx.play('shoot');
        particles.spawn(state.cannonX + CANNON_W/2, FLOOR_Y - 60, '#fffc00', 3);
        
        const el = document.createElement('div');
        el.className = 'bullet';
        
        const spreadX = i < spreads.length ? spreads[i] : 0;
        const x = state.cannonX + CANNON_W / 2 - 4 + spreadX; // center bullet + spread
        const y = FLOOR_Y - 50 - 25; // above cannon barrel
        
        // Projectile Speed
        const baseSpeed = 10;
        const projSpeed = baseSpeed + (state.projSpeedLvl - 1) * 3;
        
        // Bullet Size
        const sizeScale = 1 + (state.bulletSizeLvl - 1) * 0.2;
        el.style.transform = `scale(${sizeScale})`;
        
        // Shockwave Generator
        state.shotCounter++;
        let isExplosive = false;
        if (state.shockwaveLvl > 0 && state.shotCounter % 10 === 0) {
          isExplosive = true;
          el.style.background = '#ff0000';
          el.style.boxShadow = '0 0 10px #ff0000';
        }

        container.appendChild(el);
        state.bullets.push({
          x, y, el, 
          vy: -projSpeed, 
          pierce: state.pierceLvl,
          isExplosive,
          hitBalls: [] // To avoid hitting the same ball multiple times per pierce
        });
      }
    }
    
    function draw(timestamp) {
      // Parallax
      const offset = (state.cannonX / GAME_W) * 20;
      bgLayerFar.style.transform = `translateX(${-offset * 0.5}px)`;
      bgLayerMid.style.transform = `translateX(${-offset * 1.5}px)`;
      bgLayerNear.style.transform = `translateX(${-offset * 3}px)`;

      cannonEl.style.left = state.cannonX + 'px';
      
      state.bullets.forEach(b => {
        b.el.style.left = b.x + 'px';
        b.el.style.top = b.y + 'px';
      });
      
      state.balls.forEach(b => {
        b.el.style.left = b.x + 'px';
        b.el.style.top = b.y + 'px';
      });
      
      state.drops.forEach(d => {
        d.el.style.left = d.x + 'px';
        d.el.style.top = d.y + 'px';
      });
    }
    
    function gameOver() {
        state.running = false;
        saveProgress(); // Save up to game over
        gameOverScreen.style.display = 'flex';
        levelProgressContainer.style.display = 'none';
    }
    
    function levelComplete() {
        state.running = false;
        saveProgress();
        victoryScreen.style.display = 'flex';
    }
    
    // Start!
    init();
  </script>
</body>
