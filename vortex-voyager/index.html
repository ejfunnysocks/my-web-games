<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex Voyager | Arcade Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg: #020617;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            transition: opacity 0.3s ease;
        }

        .hidden { opacity: 0; pointer-events: none; }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .btn {
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(99, 102, 241, 0.6);
        }

        .portal-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 100px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 110;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .portal-btn:hover { background: rgba(255, 255, 255, 0.2); }

        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            z-index: 90;
        }

        #speed-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 100px;
            overflow: hidden;
            z-index: 90;
        }

        #speed-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            transition: width 0.1s;
        }

        /* Speed Lines VFX */
        #vfx-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <a href="../" class="portal-btn">← Arcade Hub</a>
        <div id="score-display">0</div>
        <div id="speed-bar"><div id="speed-fill"></div></div>
        <div id="vfx-overlay"></div>
        <canvas id="game-canvas"></canvas>

        <!-- Menu Overlay -->
        <div id="menu-overlay" class="overlay">
            <h1>Vortex<br>Voyager</h1>
            <p style="margin-bottom: 2rem; color: #94a3b8; text-align: center; max-width: 80%;">Drag or swipe to rotate while falling. Dodge the blocks and hit the rings!</p>
            <button id="start-btn" class="btn">Descent</button>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over-overlay" class="overlay hidden">
            <h1 style="color: var(--accent); background: none; -webkit-text-fill-color: var(--accent);">Crash!</h1>
            <p id="final-score" style="font-size: 1.5rem; margin-bottom: 2rem;">Score: 0</p>
            <button id="restart-btn" class="btn">Go Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const speedFill = document.getElementById('speed-fill');
        const menuOverlay = document.getElementById('menu-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const finalScoreEl = document.getElementById('final-score');
        const vfxOverlay = document.getElementById('vfx-overlay');

        let width, height;
        function resize() {
            width = canvas.width = canvas.offsetWidth;
            height = canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Constants
        const TUNNEL_LAYERS = 25;
        const LAYER_SPACING = 0.4;
        const ROTATION_SENSITIVITY = 0.008;

        // State
        const state = {
            running: false,
            score: 0,
            distance: 0,
            speed: 0.05,
            targetSpeed: 0.05,
            rotation: 0,
            targetRotation: 0,
            playerAngle: Math.PI / 2,
            layers: [], // Tunnel rings/objects
            lastTime: 0,
            particles: []
        };

        // Utility
        const random = (min, max) => Math.random() * (max - min) + min;

        // --- SFX Engine ---
        class SFXManager {
            constructor() {
                this.ctx = null;
                this.enabled = true;
            }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            play(type) {
                if (!this.enabled || !this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                switch(type) {
                    case 'swish':
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                        gain.gain.setValueAtTime(0.05, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.2);
                        osc.start(); osc.stop(now + 0.2);
                        break;
                    case 'ring':
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(800, now);
                        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.linearRampToValueAtTime(0, now + 0.3);
                        osc.start(); osc.stop(now + 0.3);
                        break;
                    case 'crash':
                        this.playNoise(now, 0.5, 0.3);
                        break;
                }
            }
            playNoise(time, duration, volume) {
                const bufferSize = this.ctx.sampleRate * duration;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(volume, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
                noise.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start(time); noise.stop(time + duration);
            }
        }
        const sfx = new SFXManager();

        // --- Particle System ---
        class ParticleSystem {
            constructor() { this.particles = []; }
            spawn(x, y, color, count = 10) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x, y,
                        vx: random(-5, 5),
                        vy: random(-5, 5),
                        size: random(2, 5),
                        life: 1.0,
                        decay: random(0.02, 0.05),
                        color: color || '#fff'
                    });
                }
            }
            update() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }
            draw() {
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1.0;
            }
        }
        const particles = new ParticleSystem();

        // --- Tunnel Logic ---
        function createLayer(z) {
            const obstacles = [];
            const isObstacleLayer = Math.random() < 0.4 && z > 2;
            if (isObstacleLayer) {
                const count = Math.floor(random(1, 3));
                for(let i=0; i<count; i++) {
                    obstacles.push({
                        type: 'wall',
                        angle: random(0, Math.PI * 2),
                        width: random(Math.PI / 4, Math.PI / 2)
                    });
                }
            }

            return { z, obstacles };
        }

        function initTunnel() {
            state.layers = [];
            for (let i = 0; i < TUNNEL_LAYERS; i++) {
                state.layers.push(createLayer(i * LAYER_SPACING));
            }
        }

        // --- Core Loop ---
        function update(timestamp) {
            const dt = timestamp - state.lastTime;
            state.lastTime = timestamp;

            if (!state.running) return;

            // Rotation smoothing
            state.rotation += (state.targetRotation - state.rotation) * 0.1;
            
            // Speed progression
            state.targetSpeed = 0.05 + (state.distance * 0.0001);
            state.speed += (state.targetSpeed - state.speed) * 0.01;
            state.distance += state.speed;

            // Update layers
            for (let i = state.layers.length - 1; i >= 0; i--) {
                const layer = state.layers[i];
                layer.z -= state.speed;

                if (layer.z < 0.1) {
                    // Collision Check
                    layer.obstacles.forEach(obs => {
                        const relAngle = ((obs.angle + state.rotation) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
                        const playerAngle = Math.PI / 2; // Bottom center
                        
                        const diff = Math.abs(relAngle - playerAngle);
                        const normalizedDiff = Math.min(diff, Math.PI * 2 - diff);
                        
                        if (normalizedDiff < obs.width / 2) {
                            if (obs.type === 'wall') {
                                endGame();
                            } else if (obs.type === 'ring') {
                                state.score += 50;
                                state.speed += 0.02; // Boost
                                sfx.play('ring');
                                particles.spawn(width/2, height/2 + 100, '#6366f1', 20);
                                // Remove ring once hit
                                layer.obstacles = [];
                            }
                        }
                    });

                    // Recycle layer
                    state.layers.splice(i, 1);
                    state.layers.push(createLayer(TUNNEL_LAYERS * LAYER_SPACING));
                    state.score++;
                }
            }

            scoreEl.textContent = state.score;
            speedFill.style.width = Math.min(100, (state.speed / 0.2) * 100) + '%';
            particles.update();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            const centerX = width / 2;
            const centerY = height / 2;

            // Draw layers from back to front
            for (let i = state.layers.length - 1; i >= 0; i--) {
                const layer = state.layers[i];
                // Exponential scaling for better depth feel
                const scale = Math.pow(1.5, -layer.z); 
                const radius = width * scale * 0.8;
                const alpha = Math.max(0, 1 - layer.z / 8);

                if (radius < 2) continue;

                if (radius < 2) continue;

                // Draw Obstacles
                layer.obstacles.forEach(obs => {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(obs.angle + state.rotation);
                    
                    if (obs.type === 'wall') {
                        ctx.strokeStyle = `rgba(244, 63, 94, ${alpha})`;
                        ctx.lineWidth = Math.max(2, 18 * scale);
                        
                        // Draw jagged arc (MORE SPIKY)
                        ctx.beginPath();
                        const steps = 12;
                        const startA = -obs.width/2;
                        const endA = obs.width/2;
                        for(let j=0; j<=steps; j++) {
                            const a = startA + (endA - startA) * (j/steps);
                            // Random-ish spike depth
                            const spike = (j % 2 === 0 ? 12 : -8) * scale * 0.4;
                            const r = radius + spike;
                            const px = Math.cos(a) * r;
                            const py = Math.sin(a) * r;
                            if (j === 0) ctx.moveTo(px, py);
                            else ctx.lineTo(px, py);
                        }
                        ctx.stroke();
                        
                        // Inner "electric" line
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.lineWidth = 0.5 * alpha;
                        ctx.stroke();
                        
                        // Add intense glow
                        ctx.shadowBlur = 30 * alpha;
                        ctx.shadowColor = '#f43f5e';
                        ctx.stroke();
                    }
                    ctx.restore();
                    ctx.shadowBlur = 0;
                });
            }

            // Draw Player Marker (Moved even lower)
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#6366f1';
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(centerX, height - 60, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            particles.draw();
        }

        function gameLoop(timestamp) {
            update(timestamp);
            draw();
            requestAnimationFrame(gameLoop);
        }

        // --- Controls ---
        let lastX = 0;
        let isDragging = false;

        function onStart(x) {
            if (!state.running && menuOverlay.classList.contains('hidden')) return;
            isDragging = true;
            lastX = x;
            sfx.init();
        }
        function onMove(x) {
            if (!isDragging) return;
            const dx = x - lastX;
            state.targetRotation += dx * ROTATION_SENSITIVITY;
            lastX = x;
            if (Math.abs(dx) > 5) sfx.play('swish');
        }
        function onEnd() { isDragging = false; }

        canvas.addEventListener('mousedown', e => onStart(e.clientX));
        window.addEventListener('mousemove', e => onMove(e.clientX));
        window.addEventListener('mouseup', onEnd);

        canvas.addEventListener('touchstart', e => onStart(e.touches[0].clientX));
        window.addEventListener('touchmove', e => onMove(e.touches[0].clientX));
        window.addEventListener('touchend', onEnd);

        // --- State Management ---
        function startDescent() {
            menuOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            state.running = true;
            state.score = 0;
            state.distance = 0;
            state.speed = 0.05;
            state.rotation = 0;
            state.targetRotation = 0;
            initTunnel();
            state.lastTime = performance.now();
        }

        function endGame() {
            state.running = false;
            sfx.play('crash');
            finalScoreEl.textContent = `Score: ${state.score}`;
            gameOverOverlay.classList.remove('hidden');
        }

        document.getElementById('start-btn').addEventListener('click', startDescent);
        document.getElementById('restart-btn').addEventListener('click', startDescent);

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
