<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Games</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #4a90e2;
            font-size: 3rem;
            margin-bottom: 40px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .game-link {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            color: #fff;
            text-decoration: none;
            padding: 20px 40px;
            margin: 10px;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: bold;
            width: 300px;
            transition: all 0.2s;
            border: 2px solid #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .game-link:hover {
            background: #4a90e2;
            border-color: #6fb3ff;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(74, 144, 226, 0.4);
        }
        .game-link.star-catcher:hover {
            background: #eab308;
            border-color: #fde047;
            box-shadow: 0 8px 15px rgba(234, 179, 8, 0.4);
        }

        #mobile-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
            z-index: 100;
        }
        #mobile-toggle:hover {
            background: #444;
            border-color: #777;
        }
        #mobile-toggle.enabled {
            background: #22c55e;
            border-color: #4ade80;
            color: #000;
        }
    </style>
</head>
<body>
    <button id="mobile-toggle">Mobile Mode: OFF</button>
    <h1>My Games</h1>
    
    <a href="block_blast.html" class="game-link">Cannon Blast</a>
    <a href="star_catcher.html" class="game-link star-catcher">Star Catcher</a>

    <script>
        const mobileToggle = document.getElementById('mobile-toggle');
        
        function updateToggleUI() {
            const isEnabled = localStorage.getItem('mobileControlsEnabled') === 'true';
            mobileToggle.textContent = `Mobile Mode: ${isEnabled ? 'ON' : 'OFF'}`;
            mobileToggle.className = isEnabled ? 'enabled' : '';
        }

        mobileToggle.addEventListener('click', () => {
            const currentState = localStorage.getItem('mobileControlsEnabled') === 'true';
            localStorage.setItem('mobileControlsEnabled', !currentState);
            updateToggleUI();
        });

        // Hide toggle if not a touch device (optional, but requested)
        if (!('ontouchstart' in window || navigator.maxTouchPoints > 0)) {
            mobileToggle.style.display = 'none';
        }

        updateToggleUI();
    </script>
</body>
</html>
